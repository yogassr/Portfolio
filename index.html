<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSRamG Enviro Care Pvt Ltd - Shopping</title>
  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background-color: #f8f8f8;
    }

    /* Navbar */
    header {
      background-color: #004d40;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-weight: bold;
      font-size: 1.2rem;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
      align-items: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #ffca28;
    }

    .login-btn, .profile-btn {
      background: #ffca28;
      border: none;
      color: #004d40;
      padding: 8px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .profile-dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      background-color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      border-radius: 5px;
      overflow: hidden;
      z-index: 1;
    }

    .dropdown-content a {
      display: block;
      padding: 10px;
      color: #004d40;
      text-decoration: none;
    }

    .dropdown-content a:hover {
      background-color: #f1f1f1;
    }

    .profile-dropdown:hover .dropdown-content {
      display: block;
    }

    /* Main Layout */
    .container {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      height: fit-content;
    }

    .sidebar h3 {
      margin-top: 0;
    }

    /* Price Slider */
    .price-range {
      width: 100%;
    }

    /* Products Section */
    .main-content {
      flex: 1;
    }

    .sort-section {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 15px;
    }

    .sort-select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .product {
      background: white;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
      transition: transform 0.3s;
    }

    .product:hover {
      transform: translateY(-5px);
    }

    .product img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .product h4 {
      margin: 10px 0 5px;
    }

    .product .price {
      color: #004d40;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .stars {
      color: #ffca28;
    }

    @media(max-width:768px){
      .container{
        flex-direction: column;
      }
      .sidebar{
        width: 100%;
        order: 2;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><img src="logo.png" style="width: 30px; height: 30px;"/> SSRamG Enviro Care Pvt Ltd</div>
  <nav>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Shopping</a></li>
      <li id="loginSection">
        <button class="login-btn" onclick="loginUser()">Login</button>
      </li>
    </ul>
  </nav>
</header>

<div class="container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <h3>Filter</h3>
    <label>Price range:</label>
    <input type="range" min="0" max="20000" step="1000" class="price-range" id="priceRange">
    <p>Up to ₹<span id="priceValue">20000</span></p>

    <h4>Rating</h4>
    <label><input type="checkbox" class="rating-filter" value="4"> 4 Stars & up</label><br>
    <label><input type="checkbox" class="rating-filter" value="5"> 5 Stars</label>
  </aside>

  <!-- Product Area -->
  <section class="main-content">
    <div class="sort-section">
      <select id="sortSelect" class="sort-select">
        <option value="bestseller">Best Seller</option>
        <option value="lowhigh">Price: Low to High</option>
        <option value="highlow">Price: High to Low</option>
      </select>
    </div>

    <div class="products" id="productList">
      <!-- Products will render here -->
    </div>
  </section>
</div>

<script>
  // Sample Products
  const products = [
    {id:1, name:"PureFlow RO System", price:12000, rating:5, bestseller:true, img:"ro1.jpeg"},
    {id:2, name:"AquaSafe Water Purifier", price:9500, rating:4, bestseller:false, img:"ro2.jpeg"},
    {id:3, name:"BlueStar Elite RO", price:15000, rating:5, bestseller:true, img:"ro3.jpeg"},
    {id:4, name:"EcoPure Compact RO", price:7000, rating:4, bestseller:false, img:"ro4.jpeg"},
    {id:5, name:"Kent Supreme Plus", price:18500, rating:5, bestseller:true, img:"ro5.jpeg"},
  ];

  const productList = document.getElementById('productList');
  const sortSelect = document.getElementById('sortSelect');
  const priceRange = document.getElementById('priceRange');
  const priceValue = document.getElementById('priceValue');
  const ratingFilters = document.querySelectorAll('.rating-filter');

  function renderProducts(list){
    productList.innerHTML = '';
    list.forEach(p => {
      const ratingStars = '★'.repeat(p.rating) + '☆'.repeat(5 - p.rating);
      productList.innerHTML += `
        <div class="product">
          <img src="${p.img}" alt="${p.name}">
          <h4>${p.name}</h4>
          <div class="stars">${ratingStars}</div>
          <div class="price">₹${p.price}</div>
        </div>
      `;
    });
  }

  function filterAndSort(){
    let filtered = products.filter(p => p.price <= priceRange.value);

    // Rating filter
    const selectedRatings = [...ratingFilters].filter(c => c.checked).map(c => Number(c.value));
    if(selectedRatings.length){
      filtered = filtered.filter(p => selectedRatings.includes(p.rating));
    }

    // Sorting
    const sortValue = sortSelect.value;
    if(sortValue === 'lowhigh') filtered.sort((a,b) => a.price - b.price);
    else if(sortValue === 'highlow') filtered.sort((a,b) => b.price - a.price);
    else if(sortValue === 'bestseller') filtered.sort((a,b) => b.bestseller - a.bestseller);

    renderProducts(filtered);
  }

  sortSelect.addEventListener('change', filterAndSort);
  priceRange.addEventListener('input', () => {
    priceValue.textContent = priceRange.value;
    filterAndSort();
  });
  ratingFilters.forEach(box => box.addEventListener('change', filterAndSort));

  renderProducts(products);

  // Mock Login
  function loginUser(){
    const loginSection = document.getElementById('loginSection');
    loginSection.innerHTML = `
      <div class="profile-dropdown">
        <button class="profile-btn">👤</button>
        <div class="dropdown-content">
          <a href="#">Profile</a>
          <a href="#" onclick="logoutUser()">Sign out</a>
        </div>
      </div>
    `;
  }

  function logoutUser(){
    const loginSection = document.getElementById('loginSection');
    loginSection.innerHTML = `<button class="login-btn" onclick="loginUser()">Login</button>`;
  }
</script>

</body>
</html>
